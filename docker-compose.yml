version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: video_translation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d video_translation']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: vt_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    # Uncomment to add a password (also set REDIS_PASSWORD in .env):
    # command: redis-server --requirepass yourpassword
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: